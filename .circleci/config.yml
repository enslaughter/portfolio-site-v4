version: 2.1

jobs:
  build_and_deploy_staging:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Build with Docker
          command: docker build --target build -t portfolio-build .
      - run:
          name: Extract .next artifacts from container
          command: |
            docker create --name build-export portfolio-build
            docker cp build-export:/usr/src/app/.next ./.next
            docker rm build-export
      - run:
          name: Install Vercel CLI
          command: npm install --global vercel@latest
      - run:
          name: Pull Vercel environment info (preview)
          command: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
      - run:
          name: Package artifacts for Vercel deployment
          command: vercel build --token=$VERCEL_TOKEN
      - run:
          name: Deploy to Vercel (preview)
          command: vercel deploy --prebuilt --token=$VERCEL_TOKEN

  build_and_deploy_production:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Build with Docker
          command: docker build --target build -t portfolio-build .
      - run:
          name: Extract .next artifacts from container
          command: |
            docker create --name build-export portfolio-build
            docker cp build-export:/usr/src/app/.next ./.next
            docker rm build-export
      - run:
          name: Install Vercel CLI
          command: npm install --global vercel@latest
      - run:
          name: Pull Vercel environment info (production)
          command: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - run:
          name: Package artifacts for Vercel deployment
          command: vercel build --prod --token=$VERCEL_TOKEN
      - run:
          name: Deploy to Vercel (production)
          command: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

workflows:
  staging_and_production:
    jobs:
      - build_and_deploy_staging:
          filters:
            branches:
              ignore: main
      - build_and_deploy_production:
          filters:
            branches:
              only: main
